sonar.projectKey=Pratyay-Patel_PlaceSync-frontend
sonar.organization=pratyay-patel
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.exclusions=src/test/**,node_modules/**,dist/**,coverage/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Pages are integration/E2E tested, not unit tested. Routes, layouts, lib, and theme
# are infrastructure with no testable business logic. Exclude all from coverage gate.
sonar.coverage.exclusions=\
  src/pages/**,\
  src/routes/**,\
  src/main.tsx,\
  src/components/layout/**,\
  src/lib/**,\
  src/theme/**

# Page-level UI structure is expected to share patterns (forms, tables, auth shells).
# Exclude pages from duplication detection to avoid false positives on intentional structure.
sonar.cpd.exclusions=src/pages/**
