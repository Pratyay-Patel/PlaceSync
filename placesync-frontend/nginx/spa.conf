server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API calls to the Spring Boot container.
    # In Docker Compose, "api" resolves to the api service over the internal network.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve static assets directly; fall back to index.html for all other paths
    # so React Router handles client-side navigation without 404s on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively; browsers can safely cache them forever
    # because Vite embeds a content hash in the filename on every build.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
