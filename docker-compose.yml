# ─────────────────────────────────────────────────────────────────────────────
# PlaceSync — Docker Compose (Phase 1: Foundation)
#
# Services included:
#   - postgres   PostgreSQL 16 (database)
#   - api        Spring Boot application
#
# Services NOT yet included (added in later phases):
#   - redis      (Phase 3 — caching)
#   - kafka      (Phase 4 — event streaming)
#   - nginx      (Phase 6 — reverse proxy / production deployment)
#
# Usage:
#   cp .env.example .env          # fill in real values
#   docker compose up             # start all services
#   docker compose up -d          # start in background
#   docker compose down -v        # stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: placesync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: placesync_dev
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      # Expose to host so IntelliJ / DBeaver can connect directly during development.
      # Restrict this port on the VPS firewall in production (UFW deny 5432).
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - placesync-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d placesync_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Spring Boot API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: placesync-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/placesync_dev
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - placesync-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local

networks:
  placesync-net:
    driver: bridge
