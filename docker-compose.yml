# ─────────────────────────────────────────────────────────────────────────────
# PlaceSync — Docker Compose (Phase 4: Kafka event streaming added)
#
# Services included:
#   - postgres   PostgreSQL 16 (database)
#   - redis      Redis 7 (cache)
#   - kafka      Confluent KRaft-mode Kafka 7.6 (event streaming)
#   - api        Spring Boot application
#
# Services NOT yet included (added in later phases):
#   - nginx      (Phase 6 — reverse proxy / production deployment)
#
# Usage:
#   cp .env.example .env          # fill in real values
#   docker compose up             # start all services
#   docker compose up -d          # start in background
#   docker compose down -v        # stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: placesync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: placesync_dev
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      # Host port 5433 avoids conflict with any local PostgreSQL on 5432.
      # The API container still reaches this DB via postgres:5432 over the Docker network.
      # Connect pgAdmin/DBeaver to localhost:5433 to inspect the Docker DB directly.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - placesync-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d placesync_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: placesync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - placesync-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode — no ZooKeeper) ─────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: placesync-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two listeners: INTERNAL for container-to-container, EXTERNAL for host-to-container (mvn spring-boot:run)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    ports:
      - "9093:9093"    # external listener — used by mvn spring-boot:run on the host
    networks:
      - placesync-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Spring Boot API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: placesync-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/placesync_dev
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092   # internal listener — container-to-container only
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_APP_PASSWORD: ${MAIL_APP_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET_RESUMES: ${AWS_S3_BUCKET_RESUMES:-placesync-resumes-340541182878-ap-south-1-an}
      AWS_S3_BUCKET_PICTURES: ${AWS_S3_BUCKET_PICTURES:-placesync-profile-pictures-340541182878-ap-south-1-an}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - placesync-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local

networks:
  placesync-net:
    driver: bridge
