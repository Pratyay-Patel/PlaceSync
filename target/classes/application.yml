spring:
  application:
    name: placesync

  # JPA / Hibernate base configuration
  # DDL is managed entirely by Flyway — Hibernate must never auto-create or update schema
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  # Flyway base configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history

server:
  port: 8080

# Actuator configuration
# Only health and info are exposed; restrict to internal/admin access via Nginx in production
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        # Exposes /actuator/health/liveness and /actuator/health/readiness
        # Used by load balancers and container orchestration (future Kubernetes support)
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Metadata surfaced at /actuator/info
info:
  app:
    name: PlaceSync
    description: SaaS Placement Management Platform
    version: 1.0.0
    phase: Phase 1 — Foundation
