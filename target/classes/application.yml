spring:
  application:
    name: placesync

  # JPA / Hibernate base configuration
  # DDL is managed entirely by Flyway — Hibernate must never auto-create or update schema
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  # Flyway base configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history

server:
  port: 8080

# Actuator configuration
# Only health and info are exposed; restrict to internal/admin access via Nginx in production
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        # Exposes /actuator/health/liveness and /actuator/health/readiness
        # Used by load balancers and container orchestration (future Kubernetes support)
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Metadata surfaced at /actuator/info
info:
  app:
    name: PlaceSync
    description: SaaS Placement Management Platform
    version: 1.0.0
    phase: Phase 2 — Auth Layer

# ─────────────────────────────────────────────────────────────────────────────
# Application-level configuration (bound to @ConfigurationProperties beans)
# ─────────────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-32ch}
    access-token-expiry-ms: ${JWT_ACCESS_TOKEN_EXPIRY_MS:900000}
    refresh-token-expiry-days: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:7}
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000}
  base-url: ${APP_BASE_URL:http://localhost:8080}
