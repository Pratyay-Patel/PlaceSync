name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build, test, and analyse
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify sonar:sonar \
            -Dspring.profiles.active=test \
            -Dsonar.token=$SONAR_TOKEN \
            "-Dsonar.coverage.exclusions=**/controller/**,**/entity/**,**/dto/**,**/mapper/**,**/config/**,**/consumer/**,**/event/**,**/audit/**,**/util/**,**/spec/**,**/security/**,**/kafka/**,**/exception/**,**/logging/**,**/validation/**,**/PlaceSyncApplication.java,**/auth/service/EmailService.java"
