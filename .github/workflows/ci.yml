name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for secret scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-test:
    name: Frontend test
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: placesync-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: placesync-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm run coverage

      - name: SonarCloud scan (frontend)
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: placesync-frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-test:
    name: Build, test, and analyse
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build, test, and analyse
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify sonar:sonar \
            -Dspring.profiles.active=test \
            -Dsonar.token=$SONAR_TOKEN \
            "-Dsonar.coverage.exclusions=**/controller/**,**/entity/**,**/dto/**,**/mapper/**,**/config/**,**/consumer/**,**/event/**,**/audit/**,**/util/**,**/spec/**,**/security/**,**/kafka/**,**/exception/**,**/logging/**,**/validation/**,**/storage/**,**/PlaceSyncApplication.java,**/auth/service/EmailService.java"

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
