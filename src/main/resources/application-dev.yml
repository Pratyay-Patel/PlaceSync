# ─────────────────────────────────────────────────────────────────────────────
# Profile: dev
# Activate with: SPRING_PROFILES_ACTIVE=dev  (or pass --spring.profiles.active=dev)
# All sensitive values fall back to safe local defaults so the app starts
# immediately without any extra environment configuration on a developer machine.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/placesync_dev
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PlaceSyncDevPool
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

logging:
  level:
    root: INFO
    com.placesync: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG
