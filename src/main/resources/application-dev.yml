# ─────────────────────────────────────────────────────────────────────────────
# Profile: dev
# Activate with: SPRING_PROFILES_ACTIVE=dev  (or pass --spring.profiles.active=dev)
# All sensitive values fall back to safe local defaults so the app starts
# immediately without any extra environment configuration on a developer machine.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/placesync_dev}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PlaceSyncDevPool
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.placesync.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        delivery.timeout.ms: 3000      # fail fast so fallback fires within 3s if broker is unreachable
        request.timeout.ms: 2000
        max.block.ms: 2000

logging:
  level:
    root: INFO
    com.placesync: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG
