<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body{margin:0;padding:20px;background:#f4f6f8;font-family:Arial,sans-serif}
        .card{max-width:560px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
        .header{background:#1565C0;padding:24px 32px}
        .header h1{margin:0;color:#fff;font-size:20px;letter-spacing:.5px}
        .body{padding:32px;color:#333;line-height:1.6}
        .body h2{margin-top:0;color:#1565C0;font-size:18px}
        .detail{background:#E3F2FD;border-radius:6px;padding:16px 20px;margin:16px 0}
        .detail p{margin:6px 0;font-size:15px}
        .footer{padding:16px 32px;background:#f4f6f8;font-size:12px;color:#888;text-align:center}
    </style>
</head>
<body>
<div class="card">
    <div class="header"><h1>PlaceSync</h1></div>
    <div class="body">
        <h2>Interview scheduled</h2>
        <p>An interview has been scheduled for your application. Please find the details below.</p>
        <div class="detail">
            <p><strong>Round:</strong> <span th:text="${round}"></span></p>
            <p><strong>Date &amp; Time:</strong> <span th:text="${scheduledAt}"></span></p>
            <p th:if="${meetingLink != null and !meetingLink.isEmpty()}">
                <strong>Meeting Link:</strong> <a th:href="${meetingLink}" th:text="${meetingLink}"></a>
            </p>
        </div>
        <p style="font-size:13px;color:#666">Please ensure you are prepared and available at the scheduled time. Good luck!</p>
    </div>
    <div class="footer"><p>&copy; 2025 PlaceSync &mdash; Automated message, please do not reply.</p></div>
</div>
</body>
</html>
