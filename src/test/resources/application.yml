# ─────────────────────────────────────────────────────────────────────────────
# Test configuration
# Used by @ActiveProfiles("test") in PlaceSyncApplicationTests.
# H2 in-memory database removes the need for a real PostgreSQL instance in CI.
# Flyway is disabled because V001 uses PostgreSQL-specific ENUM types that H2
# does not support. Schema creation is handled by Hibernate's create-drop for
# the (currently empty) entity set.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      # none: Hibernate does not run any DDL — avoids H2 failures caused by
      # PostgreSQL-specific columnDefinition types (e.g. user_role, gender_type).
      # Schema creation is Flyway's job; context load tests don't need it.
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false

  cache:
    type: none

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

logging:
  level:
    root: WARN
