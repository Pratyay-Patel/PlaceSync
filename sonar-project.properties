# SonarCloud project configuration
# Safe to commit — contains no secrets.
# Pass your token at runtime: mvn sonar:sonar -Dsonar.token=<your-token>
#
# Fill in sonar.organization with your SonarCloud organization key
# (visible in SonarCloud → Administration → Organization settings → Key).
# The project key is auto-assigned when you import the GitHub repo;
# copy it from SonarCloud → Project → Project Information.

sonar.projectKey=Pratyay-Patel_PlaceSync
sonar.organization=pratyay-patel
sonar.host.url=https://sonarcloud.io

sonar.java.source=21
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclude generated code and configuration from analysis
sonar.exclusions=**/target/**,**/*.xml,**/resources/**
